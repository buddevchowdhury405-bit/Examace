<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET Mock Test</title>

<style>
body{
background:#02051f;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.question{
background:#111827;
padding:20px;
margin:20px 0;
border-radius:15px;
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff00ff;
color:white;
}
</style>
</head>

<body>

<h1>🧬 NEET Mock Test</h1>

<div class="question">
<p>1. Powerhouse of the cell?</p>

<input type="radio" name="q1" value="0"> Ribosome<br><br>

<input type="radio" name="q1" value="1"> Mitochondria<br><br>

<input type="radio" name="q1" value="0"> Nucleus<br><br>

<input type="radio" name="q1" value="0"> Golgi Body
</div>

<div class="question">
<p>2. Blood is pumped by which organ?</p>

<input type="radio" name="q2" value="1"> Heart<br><br>

<input type="radio" name="q2" value="0"> Liver<br><br>

<input type="radio" name="q2" value="0"> Kidney<br><br>

<input type="radio" name="q2" value="0"> Lung
</div>

<button onclick="checkScore()">Submit Test</button>

<h2 id="result"></h2>

<script>
function checkScore(){

let score=0;

let q1=document.querySelector('input[name="q1"]:checked');
let q2=document.querySelector('input[name="q2"]:checked');

if(q1) score+=Number(q1.value);
if(q2) score+=Number(q2.value);

document.getElementById("result").innerHTML=
"Your Score: "+score+"/2";
}
</script>

</body>
</html>
